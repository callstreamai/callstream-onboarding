services:
  - type: web
    name: callstream-onboarding
    runtime: docker
    repo: https://github.com/callstreamai/callstream-onboarding
    branch: main
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
